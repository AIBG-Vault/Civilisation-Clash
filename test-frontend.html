<!doctype html>
<html>
  <head>
    <title>Frontend Test</title>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(15, 30px);
        gap: 1px;
        background: #000;
        padding: 1px;
      }
      .cell {
        width: 30px;
        height: 30px;
        background: #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .team-0 {
        background: blue;
        color: white;
      }
      .team-1 {
        background: red;
        color: white;
      }
      #log {
        margin-top: 20px;
        height: 200px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Civilization Clash - Test</h1>
    <div>Status: <span id="status">Disconnected</span></div>
    <div>Turn: <span id="turn">0</span> / 50</div>
    <button onclick="connect()">Connect</button>
    <button onclick="autoPlay()">Auto Play</button>
    <div id="grid"></div>
    <div id="log"></div>

    <script>
      let ws = null;
      let myTeamId = -1;
      let gameState = null;

      // Create grid
      const grid = document.getElementById('grid');
      for (let y = 0; y < 10; y++) {
        for (let x = 0; x < 15; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `c${x}-${y}`;
          grid.appendChild(cell);
        }
      }

      function log(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += msg + '<br>';
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      function connect() {
        ws = new WebSocket('ws://localhost:8080');

        ws.onopen = () => {
          document.getElementById('status').textContent = 'Connected';
          log('Connected to server');
        };

        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          log('Received: ' + msg.type);

          if (msg.type === 'AUTH_SUCCESS') {
            myTeamId = msg.teamId;
            log('I am team ' + myTeamId);
          }

          if (msg.type === 'GAME_STATE') {
            gameState = msg.state;
            document.getElementById('turn').textContent = gameState.turn;

            // Clear grid
            document.querySelectorAll('.cell').forEach((c) => (c.textContent = ''));

            // Draw units
            gameState.units.forEach((u) => {
              const cell = document.getElementById(`c${u.x}-${u.y}`);
              if (cell) {
                cell.textContent = u.hp;
                cell.className = `cell team-${u.owner}`;
              }
            });
          }

          if (msg.type === 'GAME_OVER') {
            log('Game over! Winner: ' + (msg.winner === null ? 'TIE' : msg.winner));
          }
        };

        ws.onclose = () => {
          document.getElementById('status').textContent = 'Disconnected';
          log('Disconnected');
        };
      }

      function autoPlay() {
        if (!ws || !gameState) return;

        const myUnits = gameState.units.filter((u) => u.owner === myTeamId);
        const actions = myUnits.map((u) => ({
          type: 'MOVE',
          unitId: u.id,
          targetX: u.x + (u.x < 7 ? 1 : -1),
          targetY: u.y,
        }));

        ws.send(JSON.stringify({ type: 'SUBMIT_ACTIONS', actions }));
        log('Sent ' + actions.length + ' actions');
      }

      // Auto-play every second if connected
      setInterval(() => {
        if (ws && ws.readyState === 1 && gameState && !gameState.gameOver) {
          autoPlay();
        }
      }, 1000);
    </script>
  </body>
</html>
