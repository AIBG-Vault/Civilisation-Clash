<!doctype html>
<html>
  <head>
    <title>WebSocket Connection Test</title>
  </head>
  <body>
    <h1>WebSocket Connection Test</h1>
    <button onclick="testConnection()">Test Connection</button>
    <div id="output"></div>

    <script>
      function testConnection() {
        const output = document.getElementById('output');
        output.innerHTML = 'Attempting to connect to ws://localhost:8080...<br>';

        try {
          const ws = new WebSocket('ws://localhost:8080');

          ws.onopen = function () {
            output.innerHTML += 'SUCCESS: Connected!<br>';
            output.innerHTML += 'WebSocket state: ' + ws.readyState + '<br>';
          };

          ws.onmessage = function (event) {
            output.innerHTML += 'Received message: ' + event.data + '<br>';
          };

          ws.onerror = function (error) {
            output.innerHTML += 'ERROR: ' + error + '<br>';
            console.error('WebSocket error:', error);
          };

          ws.onclose = function (event) {
            output.innerHTML +=
              'Connection closed. Code: ' + event.code + ', Reason: ' + event.reason + '<br>';
          };
        } catch (e) {
          output.innerHTML += 'EXCEPTION: ' + e.message + '<br>';
        }
      }
    </script>
  </body>
</html>
