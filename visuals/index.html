<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Civilization Clash - MVP</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #2a2a2a;
        color: white;
        margin: 20px;
      }

      h1 {
        margin: 10px 0;
      }

      #status {
        margin: 10px;
        font-size: 20px;
        color: #4caf50;
      }

      #grid {
        display: grid;
        grid-template-columns: repeat(15, 40px);
        grid-template-rows: repeat(10, 40px);
        gap: 1px;
        background: #000;
        padding: 1px;
        margin: 20px;
      }

      .cell {
        width: 40px;
        height: 40px;
        background: #4a4a4a;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border: 1px solid #333;
      }

      .unit {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 12px;
        color: white;
        position: relative;
      }

      .team-0 {
        background: #3498db; /* Blue */
        box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
      }

      .team-1 {
        background: #e74c3c; /* Red */
        box-shadow: 0 0 5px rgba(231, 76, 60, 0.5);
      }

      #info {
        display: flex;
        gap: 30px;
        margin: 20px;
        font-size: 18px;
      }

      .team-info {
        padding: 10px 20px;
        border-radius: 5px;
        background: rgba(0, 0, 0, 0.5);
      }

      .team-0-info {
        border: 2px solid #3498db;
      }

      .team-1-info {
        border: 2px solid #e74c3c;
      }

      .hp-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: rgba(0, 0, 0, 0.5);
      }

      .hp-fill {
        height: 100%;
        background: #2ecc71;
        transition: width 0.3s;
      }

      .hp-low {
        background: #f39c12;
      }

      .hp-critical {
        background: #e74c3c;
      }

      #gameOver {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.95);
        padding: 40px;
        border-radius: 10px;
        font-size: 32px;
        text-align: center;
        border: 3px solid #fff;
        z-index: 1000;
      }

      #winner {
        margin-bottom: 20px;
        font-weight: bold;
      }

      .controls {
        margin: 20px;
        display: flex;
        gap: 10px;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover:not(:disabled) {
        background: #45a049;
      }

      button:disabled {
        background: #666;
        cursor: not-allowed;
      }

      .turn-indicator {
        font-size: 24px;
        font-weight: bold;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h1>🎮 Civilization Clash - MVP 🎮</h1>

    <div id="status">Connecting to server...</div>

    <div class="turn-indicator">Turn: <span id="turn">0</span> / <span id="maxTurns">50</span></div>

    <div id="grid"></div>

    <div id="info">
      <div class="team-info team-0-info">
        <div style="color: #3498db; font-weight: bold">BLUE TEAM</div>
        <div>Units: <span id="blue-units">0</span></div>
        <div>HP Total: <span id="blue-hp">0</span></div>
      </div>
      <div class="team-info team-1-info">
        <div style="color: #e74c3c; font-weight: bold">RED TEAM</div>
        <div>Units: <span id="red-units">0</span></div>
        <div>HP Total: <span id="red-hp">0</span></div>
      </div>
    </div>

    <div class="controls">
      <button id="connectBtn">Connect as Player</button>
      <button id="autoPlayBtn" disabled>Enable Auto-Play</button>
    </div>

    <div id="gameOver">
      <div id="winner"></div>
      <div style="font-size: 16px; margin-top: 20px">Game will reset in 5 seconds...</div>
    </div>

    <script>
      // Configuration
      const WS_URL = 'ws://localhost:8080';
      const GRID_WIDTH = 15;
      const GRID_HEIGHT = 10;

      // State
      let ws = null;
      let gameState = null;
      let myTeamId = -1;
      let autoPlay = false;
      let connected = false;

      // Initialize grid
      function initGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        for (let y = 0; y < GRID_HEIGHT; y++) {
          for (let x = 0; x < GRID_WIDTH; x++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${x}-${y}`;
            cell.dataset.x = x;
            cell.dataset.y = y;
            grid.appendChild(cell);
          }
        }
      }

      // Connect to server
      function connect() {
        if (connected) return;

        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
          console.log('Connected to server');
          connected = true;
          document.getElementById('status').textContent = 'Connected - Waiting for game...';
          document.getElementById('status').style.color = '#4CAF50';
          document.getElementById('connectBtn').textContent = 'Connected';
          document.getElementById('connectBtn').disabled = true;
          document.getElementById('autoPlayBtn').disabled = false;
        };

        ws.onmessage = (event) => {
          const message = JSON.parse(event.data);
          console.log('Received:', message.type);

          if (message.type === 'AUTH_SUCCESS') {
            myTeamId = message.teamId;
            const teamName =
              myTeamId === 0 ? 'Blue Team' : myTeamId === 1 ? 'Red Team' : 'Spectator';
            document.getElementById('status').textContent = `Playing as ${teamName}`;

            if (myTeamId >= 0) {
              document.getElementById('status').style.color =
                myTeamId === 0 ? '#3498db' : '#e74c3c';
            }
          }

          if (message.type === 'GAME_STATE') {
            gameState = message.state;
            updateDisplay();

            // Auto-play if enabled
            if (autoPlay && myTeamId >= 0 && !gameState.gameOver) {
              setTimeout(() => autoPlayMove(message.yourTeamId), 100);
            }
          }

          if (message.type === 'GAME_OVER') {
            showGameOver(message);
          }
        };

        ws.onerror = (error) => {
          console.error('WebSocket error:', error);
          document.getElementById('status').textContent = 'Connection error';
          document.getElementById('status').style.color = '#e74c3c';
        };

        ws.onclose = () => {
          console.log('Disconnected from server');
          connected = false;
          document.getElementById('status').textContent = 'Disconnected';
          document.getElementById('status').style.color = '#e74c3c';
          document.getElementById('connectBtn').textContent = 'Reconnect';
          document.getElementById('connectBtn').disabled = false;
          document.getElementById('autoPlayBtn').disabled = true;
        };
      }

      // Update display based on game state
      function updateDisplay() {
        if (!gameState) return;

        // Clear grid
        document.querySelectorAll('.cell').forEach((cell) => {
          cell.innerHTML = '';
        });

        // Place units
        gameState.units.forEach((unit) => {
          const cell = document.getElementById(`cell-${unit.x}-${unit.y}`);
          if (cell) {
            const unitDiv = document.createElement('div');
            unitDiv.className = `unit team-${unit.owner}`;
            unitDiv.textContent = 'S';

            // HP bar
            const hpBar = document.createElement('div');
            hpBar.className = 'hp-bar';
            const hpFill = document.createElement('div');
            hpFill.className = 'hp-fill';

            const hpPercent = (unit.hp / unit.maxHp) * 100;
            hpFill.style.width = `${hpPercent}%`;

            if (hpPercent <= 33) {
              hpFill.classList.add('hp-critical');
            } else if (hpPercent <= 66) {
              hpFill.classList.add('hp-low');
            }

            hpBar.appendChild(hpFill);
            unitDiv.appendChild(hpBar);

            cell.appendChild(unitDiv);
          }
        });

        // Update info
        document.getElementById('turn').textContent = gameState.turn;
        document.getElementById('maxTurns').textContent = gameState.maxTurns;

        const blueUnits = gameState.units.filter((u) => u.owner === 0);
        const redUnits = gameState.units.filter((u) => u.owner === 1);

        document.getElementById('blue-units').textContent = blueUnits.length;
        document.getElementById('red-units').textContent = redUnits.length;

        const blueHp = blueUnits.reduce((sum, u) => sum + u.hp, 0);
        const redHp = redUnits.reduce((sum, u) => sum + u.hp, 0);

        document.getElementById('blue-hp').textContent = blueHp;
        document.getElementById('red-hp').textContent = redHp;
      }

      // Show game over screen
      function showGameOver(message) {
        const gameOverDiv = document.getElementById('gameOver');
        const winnerDiv = document.getElementById('winner');

        if (message.winner === null) {
          winnerDiv.textContent = '⚔️ DRAW! ⚔️';
          winnerDiv.style.color = '#f39c12';
        } else {
          const winner = message.winner === 0 ? 'BLUE' : 'RED';
          const color = message.winner === 0 ? '#3498db' : '#e74c3c';
          winnerDiv.innerHTML = `🏆 ${winner} TEAM WINS! 🏆`;
          winnerDiv.style.color = color;
        }

        gameOverDiv.style.display = 'block';

        // Hide after 5 seconds
        setTimeout(() => {
          gameOverDiv.style.display = 'none';
        }, 5000);
      }

      // Auto-play for demo
      function autoPlayMove(teamId) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        const myUnits = gameState.units.filter((u) => u.owner === teamId);

        if (myUnits.length === 0) {
          // No units, send empty actions
          ws.send(
            JSON.stringify({
              type: 'SUBMIT_ACTIONS',
              actions: [],
            })
          );
          return;
        }

        // Simple AI: move units toward center
        const actions = [];

        myUnits.forEach((unit) => {
          let targetX = unit.x;
          let targetY = unit.y;

          // Move toward center (x=7, y=5)
          if (unit.x < 7) {
            targetX = unit.x + 1;
          } else if (unit.x > 7) {
            targetX = unit.x - 1;
          } else if (unit.y < 5) {
            targetY = unit.y + 1;
          } else if (unit.y > 5) {
            targetY = unit.y - 1;
          } else {
            // At center, move randomly
            const dirs = [
              [0, 1],
              [0, -1],
              [1, 0],
              [-1, 0],
            ];
            const dir = dirs[Math.floor(Math.random() * dirs.length)];
            targetX = unit.x + dir[0];
            targetY = unit.y + dir[1];
          }

          // Check bounds
          if (targetX >= 0 && targetX < GRID_WIDTH && targetY >= 0 && targetY < GRID_HEIGHT) {
            // Check if occupied by our own units
            const occupied = myUnits.some(
              (u) => u.x === targetX && u.y === targetY && u.id !== unit.id
            );

            if (!occupied) {
              actions.push({
                type: 'MOVE',
                unitId: unit.id,
                targetX: targetX,
                targetY: targetY,
              });
            }
          }
        });

        console.log(`Sending ${actions.length} actions`);
        ws.send(
          JSON.stringify({
            type: 'SUBMIT_ACTIONS',
            actions: actions,
          })
        );
      }

      // Button handlers
      document.getElementById('connectBtn').onclick = () => {
        connect();
      };

      document.getElementById('autoPlayBtn').onclick = () => {
        autoPlay = !autoPlay;
        const btn = document.getElementById('autoPlayBtn');
        btn.textContent = autoPlay ? 'Disable Auto-Play' : 'Enable Auto-Play';
        btn.style.background = autoPlay ? '#e74c3c' : '#4CAF50';

        if (autoPlay && gameState && !gameState.gameOver) {
          autoPlayMove(myTeamId);
        }
      };

      // Initialize
      initGrid();

      // Auto-connect after 1 second
      setTimeout(() => {
        document.getElementById('status').textContent = 'Ready to connect';
        document.getElementById('status').style.color = '#f39c12';
      }, 1000);
    </script>
  </body>
</html>
